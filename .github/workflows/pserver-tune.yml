name: pserver-tune

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: pserver-tune
  cancel-in-progress: false

jobs:
  tune:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Write pserver credentials
        run: |
          cat > screeps.json <<'EOF'
          ${{ secrets.SCREEPS_JSON }}
          EOF

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Read .claude/skills/pserver-tune/skill.md and follow its instructions to inspect the live pserver and ship one targeted bot improvement. The skill file is authoritative — do not substitute your own plan."
          show_full_output: true
          claude_args: >-
            --max-turns 60
            --allowed-tools "Read,Edit,Write,Grep,Bash(curl:*),Bash(/usr/bin/python3:*),Bash(npm run build),Bash(npm run push-pserver),Bash(ls:*),Bash(grep:*)"

      - name: Commit any code changes back to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f screeps.json
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "pserver-tune-bot"
            git config user.email "github-actions@users.noreply.github.com"
            git add -A
            if [ -s pserver-scratch-commit-msg.txt ]; then
              git commit -F pserver-scratch-commit-msg.txt
            else
              echo "WARN: bot did not write pserver-scratch-commit-msg.txt; using fallback message" >&2
              git commit -m "pserver-tune: automated bot improvements"
            fi
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          else
            echo "No code changes to commit"
          fi
          rm -f pserver-scratch-*
